<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zusammen seit 01.10.2022</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --accent-color: #ef4444;
            --secondary-text: #64748b;
            --card-bg: rgba(255, 255, 255, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
            background: linear-gradient(135deg, #fdfbf7 0%, #e2e8f0 100%);
        }

        .container {
            padding: 2rem;
            max-width: 1000px;
            width: 100%;
            animation: fadeIn 1.5s ease-out;
        }

        .heart {
            width: 8rem;
            height: 8rem;
            margin: 0 auto 1rem;
            animation: pulse 2s infinite;
            display: block;
            filter: drop-shadow(0 0 10px rgba(239, 68, 68, 0.3));
        }

        .heart svg {
            width: 100%;
            height: 100%;
            fill: var(--accent-color);
        }

        h1 {
            font-size: 2rem;
            font-weight: 500;
            margin-bottom: 3rem;
            color: var(--text-color);
            letter-spacing: 0.05em;
        }

        .counter-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .grid-detailed {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 0;
        }

        .grid-total {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 1rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .number {
            font-size: 2rem;
            font-weight: 700;
            display: block;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #0f172a, #334155);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum";
        }

        .label {
            font-size: 0.9rem;
            color: var(--secondary-text);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {

            .grid-detailed,
            .grid-total {
                grid-template-columns: 1fr;
            }

            .heart {
                width: 6rem;
                height: 6rem;
            }

            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="heart">
            <svg viewBox="0 0 24 24">
                <path
                    d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
            </svg>
        </div>
        <h1>Zusammen seit 01.10.2022</h1>

        <div class="counter-section">
            <div class="grid-detailed">
                <div class="card">
                    <span class="number" id="years">0</span>
                    <span class="label" id="label-years">Jahre</span>
                </div>
                <div class="card">
                    <span class="number" id="months">0</span>
                    <span class="label" id="label-months">Monate</span>
                </div>
                <div class="card">
                    <span class="number" id="days">0</span>
                    <span class="label" id="label-days">Tage</span>
                </div>
            </div>

            <div class="grid-total">
                <div class="card">
                    <span class="number" id="total-months">0</span>
                    <span class="label" id="label-total-months">Monate Gesamt</span>
                </div>
                <div class="card">
                    <span class="number" id="total-days">0</span>
                    <span class="label" id="label-total-days">Tage Gesamt</span>
                </div>
                <div class="card">
                    <span class="number" id="total-seconds">0</span>
                    <span class="label" id="label-total-seconds">Sekunden</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const startDate = new Date('2022-10-01T00:00:00');

        function updateCounters() {
            const now = new Date();
            const diff = now - startDate;

            // Basic time units
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            // Calculate detailed duration (Years, Months, Days)
            let y = now.getFullYear() - startDate.getFullYear();
            let m = now.getMonth() - startDate.getMonth();
            let d = now.getDate() - startDate.getDate();

            if (d < 0) {
                m--;
                const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
                d += prevMonth.getDate();
            }
            if (m < 0) {
                y--;
                m += 12;
            }

            // Total Months
            const totalMonths = (y * 12) + m;

            // Update DOM
            document.getElementById('years').textContent = y;
            document.getElementById('label-years').textContent = y === 1 ? 'Jahr' : 'Jahre';

            document.getElementById('months').textContent = m;
            document.getElementById('label-months').textContent = m === 1 ? 'Monat' : 'Monate';

            document.getElementById('days').textContent = d;
            document.getElementById('label-days').textContent = d === 1 ? 'Tag' : 'Tage';

            document.getElementById('total-months').textContent = totalMonths.toLocaleString('de-DE');
            document.getElementById('label-total-months').textContent = totalMonths === 1 ? 'Monat Gesamt' : 'Monate Gesamt';

            document.getElementById('total-days').textContent = days.toLocaleString('de-DE');
            document.getElementById('label-total-days').textContent = days === 1 ? 'Tag Gesamt' : 'Tage Gesamt';

            document.getElementById('total-seconds').textContent = seconds.toLocaleString('de-DE');
            document.getElementById('label-total-seconds').textContent = seconds === 1 ? 'Sekunde' : 'Sekunden';
        }

        setInterval(updateCounters, 1000);
        updateCounters(); // Initial call
    </script>
</body>

</html>
