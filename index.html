<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ T+J</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --accent-color: #ef4444;
            --secondary-text: #64748b;
            --card-bg: rgba(255, 255, 255, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            height: 100%;
        }

        body {
            font-family: 'Outfit', sans-serif;
            color: var(--text-color);
            height: 100%;
        }

        .section {
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow-x: hidden;
            position: relative;
        }

        .section-wedding {
            background: linear-gradient(135deg, #fdfbf7 0%, #e2e8f0 100%);
        }

        .section-relationship {
            background: linear-gradient(135deg, #fdf6ec 0%, #e8d5c4 100%);
        }

        .container {
            padding: 2rem;
            max-width: 1000px;
            width: 100%;
            animation: fadeIn 0.8s ease-out;
        }

        .icon {
            font-size: 6rem;
            margin: 0 auto 1rem;
            animation: pulse 2s infinite;
            display: block;
            line-height: 1;
        }

        .heart {
            width: 8rem;
            height: 8rem;
            margin: 0 auto 1rem;
            animation: pulse 2s infinite;
            display: block;
            filter: drop-shadow(0 0 10px rgba(239, 68, 68, 0.3));
        }

        .heart svg {
            width: 100%;
            height: 100%;
            fill: var(--accent-color);
        }

        h1 {
            font-size: 2rem;
            font-weight: 500;
            margin-bottom: 3rem;
            color: var(--text-color);
            letter-spacing: 0.05em;
        }

        .counter-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .grid-detailed {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 0;
        }

        .grid-total {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 1rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .number {
            font-size: 2rem;
            font-weight: 700;
            display: block;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #0f172a, #334155);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum";
        }

        .label {
            font-size: 0.9rem;
            color: var(--secondary-text);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .scroll-hint {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            color: var(--secondary-text);
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            opacity: 0.7;
            cursor: pointer;
            white-space: nowrap;
        }

        .scroll-hint:hover {
            opacity: 1;
        }

        .scroll-hint::after {
            content: " ↓";
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
                opacity: 0.7;
            }

            50% {
                transform: translateY(5px);
                opacity: 1;
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {

            .grid-detailed,
            .grid-total,
            .grid-4 {
                grid-template-columns: repeat(2, 1fr);
            }

            .heart {
                width: 6rem;
                height: 6rem;
            }

            .icon {
                font-size: 4.5rem;
            }

            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <!-- Section 1: Wedding Countdown -->
    <div class="section section-wedding">
        <div class="container">
            <span class="icon">💍</span>
            <h1>Noch bis zum 10.10.2026</h1>

            <div class="counter-section">
                <div class="grid-4">
                    <div class="card">
                        <span class="number" id="w-months">0</span>
                        <span class="label" id="label-w-months">Monate</span>
                    </div>
                    <div class="card">
                        <span class="number" id="w-days">0</span>
                        <span class="label" id="label-w-days">Tage</span>
                    </div>
                    <div class="card">
                        <span class="number" id="w-hours">0</span>
                        <span class="label" id="label-w-hours">Stunden</span>
                    </div>
                    <div class="card">
                        <span class="number" id="w-minutes">0</span>
                        <span class="label" id="label-w-minutes">Minuten</span>
                    </div>
                </div>
            </div>

        </div>
        <div class="scroll-hint"
            onclick="document.querySelector('.section-relationship').scrollIntoView({behavior:'smooth'})">Unsere Zeit
            zusammen</div>
    </div>

    <!-- Section 2: Relationship Counter -->
    <div class="section section-relationship">
        <div class="container">
            <div class="heart">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
                </svg>
            </div>
            <h1>Zusammen seit 01.10.2022</h1>

            <div class="counter-section">
                <div class="grid-detailed">
                    <div class="card">
                        <span class="number" id="years">0</span>
                        <span class="label" id="label-years">Jahre</span>
                    </div>
                    <div class="card">
                        <span class="number" id="months">0</span>
                        <span class="label" id="label-months">Monate</span>
                    </div>
                    <div class="card">
                        <span class="number" id="days">0</span>
                        <span class="label" id="label-days">Tage</span>
                    </div>
                </div>

                <div class="grid-total">
                    <div class="card">
                        <span class="number" id="total-months">0</span>
                        <span class="label" id="label-total-months">Monate Gesamt</span>
                    </div>
                    <div class="card">
                        <span class="number" id="total-days">0</span>
                        <span class="label" id="label-total-days">Tage Gesamt</span>
                    </div>
                    <div class="card">
                        <span class="number" id="total-seconds">0</span>
                        <span class="label" id="label-total-seconds">Sekunden</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const startDate = new Date('2022-10-01T00:00:00');
        const weddingDate = new Date('2026-10-10T15:00:00+02:00');

        function pad(n) {
            return String(n).padStart(2, '0');
        }

        function updateCounters() {
            const now = new Date();

            // --- Wedding Countdown ---
            if (weddingDate > now) {
                // Full months remaining
                let wm = (weddingDate.getFullYear() - now.getFullYear()) * 12 + (weddingDate.getMonth() - now.getMonth());
                let afterWm = new Date(now.getFullYear(), now.getMonth() + wm, now.getDate(), now.getHours(), now.getMinutes(), now.getSeconds());
                if (afterWm > weddingDate) wm--;
                afterWm = new Date(now.getFullYear(), now.getMonth() + wm, now.getDate(), now.getHours(), now.getMinutes(), now.getSeconds());

                const msLeft = weddingDate - afterWm;
                const wDays = Math.floor(msLeft / 86400000);
                const wHours = Math.floor((msLeft % 86400000) / 3600000);
                const wMinutes = Math.floor((msLeft % 3600000) / 60000);

                document.getElementById('w-months').textContent = wm;
                document.getElementById('label-w-months').textContent = wm === 1 ? 'Monat' : 'Monate';
                document.getElementById('w-days').textContent = wDays;
                document.getElementById('label-w-days').textContent = wDays === 1 ? 'Tag' : 'Tage';
                document.getElementById('w-hours').textContent = pad(wHours);
                document.getElementById('label-w-hours').textContent = wHours === 1 ? 'Stunde' : 'Stunden';
                document.getElementById('w-minutes').textContent = pad(wMinutes);
                document.getElementById('label-w-minutes').textContent = wMinutes === 1 ? 'Minute' : 'Minuten';
            } else {
                document.getElementById('w-months').textContent = '0';
                ['w-days', 'w-hours', 'w-minutes'].forEach(id => {
                    document.getElementById(id).textContent = '00';
                });
            }

            // --- Relationship Counter ---
            const diff = now - startDate;
            const seconds = Math.floor(diff / 1000);
            const totalDays = Math.floor(diff / (1000 * 60 * 60 * 24));

            let y = now.getFullYear() - startDate.getFullYear();
            let m = now.getMonth() - startDate.getMonth();
            let d = now.getDate() - startDate.getDate();

            if (d < 0) {
                m--;
                const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
                d += prevMonth.getDate();
            }
            if (m < 0) {
                y--;
                m += 12;
            }

            const totalMonths = (y * 12) + m;

            document.getElementById('years').textContent = y;
            document.getElementById('label-years').textContent = y === 1 ? 'Jahr' : 'Jahre';

            document.getElementById('months').textContent = m;
            document.getElementById('label-months').textContent = m === 1 ? 'Monat' : 'Monate';

            document.getElementById('days').textContent = d;
            document.getElementById('label-days').textContent = d === 1 ? 'Tag' : 'Tage';

            document.getElementById('total-months').textContent = totalMonths.toLocaleString('de-DE');
            document.getElementById('label-total-months').textContent = totalMonths === 1 ? 'Monat Gesamt' : 'Monate Gesamt';

            document.getElementById('total-days').textContent = totalDays.toLocaleString('de-DE');
            document.getElementById('label-total-days').textContent = totalDays === 1 ? 'Tag Gesamt' : 'Tage Gesamt';

            document.getElementById('total-seconds').textContent = seconds.toLocaleString('de-DE');
            document.getElementById('label-total-seconds').textContent = seconds === 1 ? 'Sekunde' : 'Sekunden';
        }

        setInterval(updateCounters, 1000);
        updateCounters();
    </script>
</body>

</html>
